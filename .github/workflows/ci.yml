name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-lint-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check app/ tests/

      - name: Format check
        run: ruff format --check app/ tests/

      - name: Type check
        run: mypy app/ --ignore-missing-imports

      - name: Generate CI encryption key
        run: echo "MASTER_ENCRYPTION_KEY=$(python -c 'from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())')" >> "$GITHUB_ENV"

      - name: Unit tests
        run: pytest tests/unit/ -v --cov=app --cov-report=term-missing --cov-report=xml --cov-fail-under=69
        env:
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          MASTER_ENCRYPTION_KEY: ${{ env.MASTER_ENCRYPTION_KEY }}

      - name: Integration tests
        run: pytest tests/integration/ -v
        env:
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          MASTER_ENCRYPTION_KEY: ${{ env.MASTER_ENCRYPTION_KEY }}

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint . --max-warnings=0

      - name: Tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: "http://localhost:8000/api"
