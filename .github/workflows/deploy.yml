name: Deploy to Heroku

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency:
  group: heroku-deploy
  cancel-in-progress: true

env:
  HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
  BACKEND_APP: esim-db-agent-api
  FRONTEND_APP: esim-db-agent-web
  BACKEND_API_URL: https://esim-db-agent-api-d1031c6e1d47.herokuapp.com/api
  BACKEND_WS_URL: wss://esim-db-agent-api-d1031c6e1d47.herokuapp.com/api/chat/ws

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4

      - name: Login to Heroku Container Registry
        run: echo "$HEROKU_API_KEY" | docker login -u _ --password-stdin registry.heroku.com

      - name: Build backend image
        run: |
          docker build \
            --platform linux/amd64 \
            -t registry.heroku.com/${{ env.BACKEND_APP }}/web \
            -f Dockerfile.backend .

      - name: Build frontend image
        run: |
          docker build \
            --platform linux/amd64 \
            --build-arg NEXT_PUBLIC_API_URL=${{ env.BACKEND_API_URL }} \
            --build-arg NEXT_PUBLIC_WS_URL=${{ env.BACKEND_WS_URL }} \
            -t registry.heroku.com/${{ env.FRONTEND_APP }}/web \
            -f Dockerfile.frontend .

      - name: Push backend image
        run: docker push registry.heroku.com/${{ env.BACKEND_APP }}/web

      - name: Push frontend image
        run: docker push registry.heroku.com/${{ env.FRONTEND_APP }}/web

      - name: Release backend
        run: |
          IMAGE_ID=$(docker inspect --format='{{.Id}}' registry.heroku.com/${{ env.BACKEND_APP }}/web)
          curl -s -X PATCH https://api.heroku.com/apps/${{ env.BACKEND_APP }}/formation \
            -H "Content-Type: application/json" \
            -H "Accept: application/vnd.heroku+json; version=3.docker-releases" \
            -H "Authorization: Bearer ${{ secrets.HEROKU_API_KEY }}" \
            -d '{"updates":[{"type":"web","docker_image":"'"$IMAGE_ID"'"}]}'

      - name: Release frontend
        run: |
          IMAGE_ID=$(docker inspect --format='{{.Id}}' registry.heroku.com/${{ env.FRONTEND_APP }}/web)
          curl -s -X PATCH https://api.heroku.com/apps/${{ env.FRONTEND_APP }}/formation \
            -H "Content-Type: application/json" \
            -H "Accept: application/vnd.heroku+json; version=3.docker-releases" \
            -H "Authorization: Bearer ${{ secrets.HEROKU_API_KEY }}" \
            -d '{"updates":[{"type":"web","docker_image":"'"$IMAGE_ID"'"}]}'

      - name: Verify backend health
        run: |
          sleep 30
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ env.BACKEND_API_URL }}/health)
          if [ "$STATUS" != "200" ]; then
            echo "Backend health check failed with status $STATUS"
            exit 1
          fi
          echo "Backend is healthy (HTTP $STATUS)"
