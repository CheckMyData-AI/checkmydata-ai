name: Deploy to Heroku

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency:
  group: heroku-deploy
  cancel-in-progress: true

env:
  HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
  BACKEND_APP: ${{ vars.BACKEND_APP || 'checkmydata-api' }}
  FRONTEND_APP: ${{ vars.FRONTEND_APP || 'checkmydata-web' }}
  BACKEND_API_URL: ${{ vars.BACKEND_API_URL || 'https://api.checkmydata.ai/api' }}
  BACKEND_WS_URL: ${{ vars.BACKEND_WS_URL || 'wss://api.checkmydata.ai/api/chat/ws' }}
  FRONTEND_URL: ${{ vars.FRONTEND_URL || 'https://checkmydata.ai' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Login to Heroku Container Registry
        run: echo "$HEROKU_API_KEY" | docker login -u _ --password-stdin registry.heroku.com

      - name: Build backend image
        run: |
          docker build \
            --platform linux/amd64 \
            -t registry.heroku.com/${{ env.BACKEND_APP }}/web \
            -f Dockerfile.backend .

      - name: Build frontend image
        run: |
          docker build \
            --platform linux/amd64 \
            --build-arg NEXT_PUBLIC_API_URL=${{ env.BACKEND_API_URL }} \
            --build-arg NEXT_PUBLIC_WS_URL=${{ env.BACKEND_WS_URL }} \
            --build-arg NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }} \
            -t registry.heroku.com/${{ env.FRONTEND_APP }}/web \
            -f Dockerfile.frontend .

      - name: Push backend image
        run: docker push registry.heroku.com/${{ env.BACKEND_APP }}/web

      - name: Push frontend image
        run: docker push registry.heroku.com/${{ env.FRONTEND_APP }}/web

      - name: Release backend
        run: |
          IMAGE_ID=$(docker inspect --format='{{.Id}}' registry.heroku.com/${{ env.BACKEND_APP }}/web)
          curl -s -X PATCH https://api.heroku.com/apps/${{ env.BACKEND_APP }}/formation \
            -H "Content-Type: application/json" \
            -H "Accept: application/vnd.heroku+json; version=3.docker-releases" \
            -H "Authorization: Bearer ${{ secrets.HEROKU_API_KEY }}" \
            -d '{"updates":[{"type":"web","docker_image":"'"$IMAGE_ID"'"}]}'

      - name: Release frontend
        run: |
          IMAGE_ID=$(docker inspect --format='{{.Id}}' registry.heroku.com/${{ env.FRONTEND_APP }}/web)
          curl -s -X PATCH https://api.heroku.com/apps/${{ env.FRONTEND_APP }}/formation \
            -H "Content-Type: application/json" \
            -H "Accept: application/vnd.heroku+json; version=3.docker-releases" \
            -H "Authorization: Bearer ${{ secrets.HEROKU_API_KEY }}" \
            -d '{"updates":[{"type":"web","docker_image":"'"$IMAGE_ID"'"}]}'

      - name: Verify backend health
        run: |
          for i in 1 2 3 4 5; do
            sleep 30
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ env.BACKEND_API_URL }}/health)
            if [ "$STATUS" = "200" ]; then
              echo "Backend is healthy (HTTP $STATUS) on attempt $i"
              exit 0
            fi
            echo "Attempt $i: backend returned $STATUS, retrying..."
          done
          echo "Backend health check failed after 5 attempts (last status: $STATUS)"
          exit 1

      - name: Verify frontend health
        run: |
          sleep 15
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ env.FRONTEND_URL }})
          if [ "$STATUS" != "200" ]; then
            echo "Frontend health check failed with status $STATUS"
            exit 1
          fi
          echo "Frontend is healthy (HTTP $STATUS)"
