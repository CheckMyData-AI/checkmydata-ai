name: checkmydata-ai

services:
  - name: backend
    github:
      repo: <your-github-org>/checkmydata-ai
      branch: main
      deploy_on_push: true
    source_dir: backend
    dockerfile_path: Dockerfile.backend
    http_port: 8000
    instance_count: 1
    instance_size_slug: basic-xxs
    health_check:
      http_path: /api/health
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}
      - key: MASTER_ENCRYPTION_KEY
        scope: RUN_TIME
        type: SECRET
      - key: JWT_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: OPENAI_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: CORS_ORIGINS
        scope: RUN_TIME
        value: ${frontend.PUBLIC_URL}

  - name: frontend
    github:
      repo: <your-github-org>/checkmydata-ai
      branch: main
      deploy_on_push: true
    source_dir: frontend
    dockerfile_path: Dockerfile.frontend
    http_port: 3000
    instance_count: 1
    instance_size_slug: basic-xxs
    envs:
      - key: NEXT_PUBLIC_API_URL
        scope: BUILD_TIME
        value: ${backend.PUBLIC_URL}/api

databases:
  - engine: PG
    name: db
    num_nodes: 1
    size: db-s-dev-database
    version: "16"
